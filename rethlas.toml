[runtime]
default_model = "gpt-5.5"
timeout_seconds = 3600

[agents]
max_threads = 10
max_depth = 3
job_max_runtime_seconds = 3600

[providers.codex]
kind = "codex-cli"
command = "codex"

[providers.litellm]
kind = "litellm"

[providers.mock]
kind = "mock"

[providers.openai]
kind = "openai-compatible"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"

[providers.anthropic]
kind = "anthropic-compatible"
base_url = "https://api.anthropic.com/v1"
api_key_env = "ANTHROPIC_API_KEY"

[models."gpt-5.5"]
provider = "codex"
model = "gpt-5.5"
reasoning_effort = "xhigh"
supports_tools = true
supports_streaming = true

[models.openai-default]
provider = "litellm"
model = "openai/gpt-5.5"
reasoning_effort = "xhigh"
api_key_env = "OPENAI_API_KEY"
supports_tools = true
supports_streaming = true

[models.anthropic-default]
provider = "litellm"
model = "anthropic/claude-opus-4-5"
api_key_env = "ANTHROPIC_API_KEY"
supports_tools = true
supports_streaming = true

[models.openai-native-default]
provider = "openai"
model = "gpt-5.5"
reasoning_effort = "xhigh"

[models.anthropic-native-default]
provider = "anthropic"
model = "claude-opus-4-5"

[models.mock-generation]
provider = "mock"
model = "mock-generation"
mode = "generation"
supports_tools = true
supports_streaming = false

[models.mock-verification-correct]
provider = "mock"
model = "mock-verification-correct"
mode = "verification-correct"
supports_tools = false
supports_streaming = false

[models.mock-verification-wrong]
provider = "mock"
model = "mock-verification-wrong"
mode = "verification-wrong"

[models.mock-verification-malformed]
provider = "mock"
model = "mock-verification-malformed"
mode = "verification-malformed"

[verification]
host = "127.0.0.1"
port = 8091

[paths]
generation_dir = "agents/generation"
verification_dir = "agents/verification"
